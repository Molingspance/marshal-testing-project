name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.10"
            artifact-name: results-windows-py310
            results-dir: results/results-windows-py310
          - os: ubuntu-latest
            python-version: "3.10"
            artifact-name: results-linux-py310
            results-dir: results/results-linux-py310
          - os: macos-latest
            python-version: "3.10"
            artifact-name: results-macos-py310
            results-dir: results/results-macos-py310

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python files
        run: python -m compileall src tools tests

      - name: Run test suite and collect evidence
        run: python tools/run_local.py --fuzz-count 2000 --results-dir ${{ matrix.results-dir }}

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.results-dir }}/
